services:
  redpanda:
    image: redpandadata/redpanda:v24.3.5
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=768M
      - --reserve-memory=0M
      - --node-id=0
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: redpandadata/console:v2.8.4
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "18080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  create-bucket:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    entrypoint: >-
      /bin/sh -c "mc alias set lake http://minio:9000 admin password123 &&
      mc mb --ignore-existing lake/warehouse"
    depends_on:
      minio:
        condition: service_healthy

  nessie:
    image: ghcr.io/projectnessie/nessie:0.99.0
    environment:
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
      NESSIE_CATALOG_DEFAULT_WAREHOUSE: warehouse
      NESSIE_CATALOG_WAREHOUSES_WAREHOUSE_LOCATION: s3://warehouse/
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT: http://minio:9000/
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS: "true"
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password123
      AWS_REGION: us-east-1
    ports:
      - "19120:19120"
    depends_on:
      create-bucket:
        condition: service_completed_successfully

  trino:
    image: trinodb/trino:468
    ports:
      - "18082:8080"
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog:ro
    depends_on:
      - nessie

volumes:
  minio-data:
