<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="580"
    viewBox="0 0 1360 580" role="img" aria-labelledby="diagram-title diagram-description">
    <title id="diagram-title">Архитектура потокового lakehouse</title>
    <desc id="diagram-description">Заказы поступают через Kafka в Spark, сохраняются в Iceberg на MinIO и запрашиваются через Trino. Ошибки уходят в quarantine.</desc>
    <defs>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.08"/>
      </filter>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3"
        orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#64748B"/>
      </marker>
      <style>
        text { font-family: Inter, "Segoe UI", Arial, sans-serif; fill: #0F172A; }
        .label { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; fill: #64748B; }
        .title { font-size: 19px; font-weight: 600; }
        .detail { font-size: 15px; fill: #475569; }
        .step { font-size: 13px; font-weight: 700; fill: #FFFFFF; }
        .arrow { fill: none; stroke: #64748B; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
        .edge-label { font-size: 13px; font-weight: 500; fill: #64748B; }
        .lane-label { font-size: 14px; font-weight: 700; letter-spacing: 0.08em; fill: #475569; }
      </style>
    </defs>
    <rect x="1" y="1" width="1358" height="578" rx="24"
      fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

      <text x="35" y="54" class="lane-label">ОСНОВНОЙ ПОТОК</text>
      <path d="M 265 157 L 300 157" class="arrow" marker-end="url(#arrow)"/><path d="M 530 157 L 565 157" class="arrow" marker-end="url(#arrow)"/><path d="M 795 157 L 830 157" class="arrow" marker-end="url(#arrow)"/><path d="M 1060 157 L 1095 157" class="arrow" marker-end="url(#arrow)"/>

    <g>
      <rect x="35" y="90" width="230" height="135" rx="16"
        fill="#EFF6FF" stroke="#93C5FD" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="63" cy="118" r="14" fill="#2563EB"/>
         <text x="63" y="123" class="step" text-anchor="middle">1</text>
      <text x="87" y="120" class="label">PRODUCER</text>
      <text x="59" y="155" class="title" text-anchor="start"><tspan x="59" dy="0">Генератор заказов</tspan></text>
      <text x="59" y="191" class="detail" text-anchor="start"><tspan x="59" dy="0">Idempotent producer</tspan></text>
    </g>

    <g>
      <rect x="300" y="90" width="230" height="135" rx="16"
        fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="328" cy="118" r="14" fill="#64748B"/>
         <text x="328" y="123" class="step" text-anchor="middle">2</text>
      <text x="352" y="120" class="label">EVENT BUS</text>
      <text x="324" y="155" class="title" text-anchor="start"><tspan x="324" dy="0">Redpanda / Kafka</tspan></text>
      <text x="324" y="191" class="detail" text-anchor="start"><tspan x="324" dy="0">Partition и offset</tspan></text>
    </g>

    <g>
      <rect x="565" y="90" width="230" height="135" rx="16"
        fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="593" cy="118" r="14" fill="#7C3AED"/>
         <text x="593" y="123" class="step" text-anchor="middle">3</text>
      <text x="617" y="120" class="label">PROCESSING</text>
      <text x="589" y="155" class="title" text-anchor="start"><tspan x="589" dy="0">Spark Streaming</tspan></text>
      <text x="589" y="191" class="detail" text-anchor="start"><tspan x="589" dy="0">Watermark и dedup</tspan></text>
    </g>

    <g>
      <rect x="830" y="90" width="230" height="135" rx="16"
        fill="#ECFDF5" stroke="#6EE7B7" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="858" cy="118" r="14" fill="#059669"/>
         <text x="858" y="123" class="step" text-anchor="middle">4</text>
      <text x="882" y="120" class="label">LAKEHOUSE</text>
      <text x="854" y="155" class="title" text-anchor="start"><tspan x="854" dy="0">Iceberg в MinIO</tspan></text>
      <text x="854" y="191" class="detail" text-anchor="start"><tspan x="854" dy="0">Каталог Nessie</tspan></text>
    </g>

    <g>
      <rect x="1095" y="90" width="230" height="135" rx="16"
        fill="#ECFDF5" stroke="#6EE7B7" stroke-width="2" filter="url(#shadow)"/>
      <circle cx="1123" cy="118" r="14" fill="#059669"/>
         <text x="1123" y="123" class="step" text-anchor="middle">5</text>
      <text x="1147" y="120" class="label">QUERY</text>
      <text x="1119" y="155" class="title" text-anchor="start"><tspan x="1119" dy="0">Trino SQL</tspan></text>
      <text x="1119" y="191" class="detail" text-anchor="start"><tspan x="1119" dy="0">Аналитические запросы</tspan></text>
    </g>


    <g>
      <rect x="565" y="355" width="230" height="135" rx="16"
        fill="#FFF7ED" stroke="#FDBA74" stroke-width="2" filter="url(#shadow)"/>

      <text x="589" y="385" class="label">ОШИБКИ</text>
      <text x="589" y="420" class="title" text-anchor="start"><tspan x="589" dy="0">Replayable quarantine</tspan></text>
      <text x="589" y="456" class="detail" text-anchor="start"><tspan x="589" dy="0">Payload, причина, offset</tspan></text>
    </g>

    <g>
      <rect x="830" y="355" width="230" height="135" rx="16"
        fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2" filter="url(#shadow)"/>

      <text x="854" y="385" class="label">METADATA</text>
      <text x="854" y="420" class="title" text-anchor="start"><tspan x="854" dy="0">Nessie catalog</tspan></text>
      <text x="854" y="456" class="detail" text-anchor="start"><tspan x="854" dy="0">Версии Iceberg-таблиц</tspan></text>
    </g>
      <text x="680" y="215" class="edge-label" text-anchor="middle">невалидное событие</text><path d="M 680 225 L 680 355" class="arrow" marker-end="url(#arrow)"/>
      <path d="M 945 355 L 945 225" class="arrow" stroke-dasharray="7 7" marker-end="url(#arrow)"/>

  </svg>